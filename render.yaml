services:
  - type: web
    name: pipecat-bot
    runtime: docker
    plan: standard # minimum — bots need CPU
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: CARTESIA_API_KEY
        sync: false
      - key: CARTESIA_VOICE_ID
        sync: false
      - key: SIMLI_API_KEY
        sync: false
      - key: SIMLI_FACE_ID
        sync: false
